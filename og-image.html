<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 800px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #fbf9f4;
  }

  .og {
    width: 1200px;
    height: 630px;
    display: flex;
    position: relative;
    background: #fbf9f4;
    overflow: hidden;
  }

  /* Subtle background accent */
  .og::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 500px at 80% 50%, rgba(91, 138, 154, 0.06) 0%, transparent 70%);
  }

  /* Left side — text content */
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 0px 64px 72px;
    position: relative;
    z-index: 2;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 44px;
  }

  .brand img {
    width: 56px;
    height: 56px;
    object-fit: contain;
  }

  .brand span {
    font-family: 'Noto Serif', Georgia, serif;
    font-size: 32px;
    font-weight: 700;
    color: #1b1c19;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .headline {
    font-family: 'Noto Serif', Georgia, serif;
    font-size: 58px;
    font-weight: 700;
    line-height: 1.12;
    letter-spacing: -0.02em;
    color: #1b1c19;
    margin-bottom: 12px;
  }

  .headline .highlight {
    color: #5B8A9A;
  }

  .subline {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: #5a5a5a;
    line-height: 1.6;
    max-width: 440px;
    letter-spacing: 0.01em;
  }

  /* Divider line */
  .divider {
    width: 48px;
    height: 1px;
    background: rgba(91, 138, 154, 0.3);
    margin: 28px 0;
  }

  .tagline {
    font-family: 'Noto Serif', Georgia, serif;
    font-style: italic;
    font-size: 16px;
    color: #5B8A9A;
  }

  /* Right side — score UI */
  .right {
    width: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .phone-frame {
    width: 300px;
    height: 500px;
    background: #1b1c19;
    border-radius: 36px;
    border: 1px solid rgba(0, 0, 0, 0.1);
    box-shadow:
      0 40px 80px rgba(91, 138, 154, 0.15),
      0 8px 24px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
  }

  .score-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #5B8A9A;
    margin-bottom: 32px;
  }

  .score-ring {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 28px;
  }

  .score-ring svg {
    width: 180px;
    height: 180px;
    transform: rotate(-90deg);
  }

  .score-ring-bg {
    fill: none;
    stroke: rgba(255, 255, 255, 0.06);
    stroke-width: 10;
  }

  .score-ring-fill {
    fill: none;
    stroke: #5B8A9A;
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 508;
    stroke-dashoffset: 30;
    filter: drop-shadow(0 0 10px rgba(91, 138, 154, 0.35));
  }

  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.04em;
  }

  .score-summary {
    text-align: center;
    color: rgba(255, 255, 255, 0.45);
    font-size: 13px;
    font-weight: 300;
    line-height: 1.5;
    margin-bottom: 16px;
  }

  .score-delta {
    font-size: 12px;
    font-weight: 600;
    color: #22c55e;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 24px;
  }

  .score-dots {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .score-dot-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .score-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #5B8A9A;
  }

  .score-dot.amber {
    background: #f59e0b;
  }

  .score-dot-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.25);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="og">
  <!-- Left: Brand + Copy -->
  <div class="left">
    <div class="brand">
      <img src="logo.png" alt="Stooly">
      <span>Stooly</span>
    </div>
    <div class="headline">
      AI gut health tracking.<br>
      <span class="highlight">Free. Private. Instant.</span>
    </div>
    <div class="subline">
      Snap a photo. Get your gut health score in seconds. No hardware, no subscription.
    </div>
    <div class="divider"></div>
    <div class="tagline">Your gut health data. Your control.</div>
  </div>

  <!-- Right: Score UI -->
  <div class="right">
    <div class="phone-frame">
      <div class="score-label">Gut Health Score</div>
      <div class="score-ring">
        <svg viewBox="0 0 200 200">
          <circle class="score-ring-bg" cx="100" cy="100" r="81" />
          <circle class="score-ring-fill" cx="100" cy="100" r="81" />
        </svg>
        <div class="score-number">94</div>
      </div>
      <div class="score-summary">Outstanding week — ideal<br>form and perfect frequency</div>
      <div class="score-delta">&#8593; 5 pts from last week</div>
      <div class="score-dots">
        <div class="score-dot-group">
          <div class="score-dot"></div>
          <div class="score-dot-label">Form</div>
        </div>
        <div class="score-dot-group">
          <div class="score-dot amber"></div>
          <div class="score-dot-label">Cons</div>
        </div>
        <div class="score-dot-group">
          <div class="score-dot"></div>
          <div class="score-dot-label">Freq</div>
        </div>
        <div class="score-dot-group">
          <div class="score-dot"></div>
          <div class="score-dot-label">Anom</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
